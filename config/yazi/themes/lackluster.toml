# Yazi theme for lackluster
# Auto-generated from vivid theme colors

[manager]
cwd = { fg = "#7788AA" }
hovered = { fg = "#0A0A0A", bg = "#7788AA" }
preview_hovered = { fg = "#0A0A0A", bg = "#7788AA" }
find_keyword = { fg = "#D70000", bold = true }
find_position = { fg = "#FFAA88" }
tab_active = { fg = "#0A0A0A", bg = "#7788AA" }
tab_inactive = { fg = "#DEEEED", bg = "#080808" }
tab_width = 1

[status]
mode_normal = { fg = "#0A0A0A", bg = "#7788AA", bold = true }
mode_select = { fg = "#0A0A0A", bg = "#789978", bold = true }
mode_unset = { fg = "#0A0A0A", bg = "#D70000", bold = true }
permissions_t = { fg = "#7788AA" }
permissions_r = { fg = "#789978" }
permissions_w = { fg = "#D70000" }
permissions_x = { fg = "#FFAA88" }
permissions_s = { fg = "#D7007D" }

[input]
border = { fg = "#7788AA" }
title = { fg = "#7788AA" }
value = { fg = "#DEEEED" }
selected = { fg = "#0A0A0A", bg = "#7788AA" }

[confirm]
border = { fg = "#D70000" }
title = { fg = "#D70000" }
content = { fg = "#DEEEED" }

[picker]
border = { fg = "#7788AA" }
active = { fg = "#7788AA", bold = true }
inactive = { fg = "#DEEEED" }

[tabs]
active = { fg = "#0A0A0A", bg = "#7788AA" }
inactive = { fg = "#DEEEED", bg = "#080808" }

[task]
border = { fg = "#7788AA" }
title = { fg = "#7788AA" }

[help]
border = { fg = "#7788AA" }
title = { fg = "#7788AA" }

[icon]
prepend_rules = []
append_rules = []

# File type colors - including folder/directory colors
[filetype]
rules = [
  # Directories - using green color from vivid theme
  { url = "*/", fg = "#789978", bold = true },
  # Images
  { mime = "image/*", fg = "#D7007D" },
  # Videos
  { mime = "video/*", fg = "#FFAA88" },
  # Audio
  { mime = "audio/*", fg = "#C0B090" },
  # Archives
  { mime = "application/{zip,gzip,tar,bzip*,7z*,rar}", fg = "#DEEEED" },
  # Documents
  { mime = "application/{pdf,msword,ms-excel,ms-powerpoint}", fg = "#E6D5AE" },
  # Executables
  { is = "exec", fg = "#B0A890", bold = true },
  # Symlinks
  { is = "link", fg = "#7788AA" },
]
