# Yazi theme for grubox-monochrome
# Auto-generated from vivid theme colors (same as gruvbox-monochrome)

[manager]
cwd = { fg = "#9c9484" }
hovered = { fg = "#282828", bg = "#9c9484" }
preview_hovered = { fg = "#282828", bg = "#9c9484" }
find_keyword = { fg = "#bdae93", bold = true }
find_position = { fg = "#a89984" }
tab_active = { fg = "#282828", bg = "#9c9484" }
tab_inactive = { fg = "#bdae93", bg = "#3c3836" }
tab_width = 1

[status]
mode_normal = { fg = "#282828", bg = "#9c9484", bold = true }
mode_select = { fg = "#282828", bg = "#8f8a7a", bold = true }
mode_unset = { fg = "#282828", bg = "#bdae93", bold = true }
permissions_t = { fg = "#9c9484" }
permissions_r = { fg = "#8f8a7a" }
permissions_w = { fg = "#bdae93" }
permissions_x = { fg = "#c0b090" }
permissions_s = { fg = "#9c9484" }

[input]
border = { fg = "#9c9484" }
title = { fg = "#9c9484" }
value = { fg = "#bdae93" }
selected = { fg = "#282828", bg = "#9c9484" }

[confirm]
border = { fg = "#bdae93" }
title = { fg = "#bdae93" }
content = { fg = "#bdae93" }

[picker]
border = { fg = "#9c9484" }
active = { fg = "#9c9484", bold = true }
inactive = { fg = "#bdae93" }

[tabs]
active = { fg = "#282828", bg = "#9c9484" }
inactive = { fg = "#bdae93", bg = "#3c3836" }

[task]
border = { fg = "#9c9484" }
title = { fg = "#9c9484" }

[help]
border = { fg = "#9c9484" }
title = { fg = "#9c9484" }

[icon]
prepend_rules = []
append_rules = []

# File type colors - including folder/directory colors
[filetype]
rules = [
  # Directories - using green color from vivid theme (monochrome variant)
  { url = "*/", fg = "#8f8a7a", bold = true },
  # Images
  { mime = "image/*", fg = "#b0a890" },
  # Videos
  { mime = "video/*", fg = "#a89984" },
  # Audio
  { mime = "audio/*", fg = "#c0b090" },
  # Archives
  { mime = "application/{zip,gzip,tar,bzip*,7z*,rar}", fg = "#d4be98" },
  # Documents
  { mime = "application/{pdf,msword,ms-excel,ms-powerpoint}", fg = "#e6d5ae" },
  # Executables
  { is = "exec", fg = "#b0a890", bold = true },
  # Symlinks
  { is = "link", fg = "#9c9484" },
]
