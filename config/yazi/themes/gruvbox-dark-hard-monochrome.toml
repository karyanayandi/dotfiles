# Yazi theme for gruvbox-dark-hard-monochrome

[manager]
cwd = { fg = "#928374" }
hovered = { fg = "#1d2021", bg = "#928374" }
preview_hovered = { fg = "#1d2021", bg = "#928374" }
find_keyword = { fg = "#bdae93", bold = true }
find_position = { fg = "#a89984" }
tab_active = { fg = "#1d2021", bg = "#928374" }
tab_inactive = { fg = "#bdae93", bg = "#32302f" }
tab_width = 1

[status]
mode_normal = { fg = "#1d2021", bg = "#928374", bold = true }
mode_select = { fg = "#1d2021", bg = "#a89984", bold = true }
mode_unset = { fg = "#1d2021", bg = "#bdae93", bold = true }
permissions_t = { fg = "#928374" }
permissions_r = { fg = "#928374" }
permissions_w = { fg = "#bdae93" }
permissions_x = { fg = "#bdae93" }
permissions_s = { fg = "#928374" }

[input]
border = { fg = "#928374" }
title = { fg = "#928374" }
value = { fg = "#bdae93" }
selected = { fg = "#1d2021", bg = "#928374" }

[confirm]
border = { fg = "#bdae93" }
title = { fg = "#bdae93" }
content = { fg = "#bdae93" }

[picker]
border = { fg = "#928374" }
active = { fg = "#928374", bold = true }
inactive = { fg = "#bdae93" }

[tabs]
active = { fg = "#1d2021", bg = "#928374" }
inactive = { fg = "#bdae93", bg = "#32302f" }

[task]
border = { fg = "#928374" }
title = { fg = "#928374" }

[help]
border = { fg = "#928374" }
title = { fg = "#928374" }

[icon]
prepend_rules = []
append_rules = []

[filetype]
rules = [
  { url = "*/", fg = "#928374", bold = true },
  { mime = "image/*", fg = "#a89984" },
  { mime = "video/*", fg = "#a89984" },
  { mime = "audio/*", fg = "#bdae93" },
  { mime = "application/{zip,gzip,tar,bzip*,7z*,rar}", fg = "#d5c4a1" },
  { mime = "application/{pdf,msword,ms-excel,ms-powerpoint}", fg = "#ebdbb2" },
  { is = "exec", fg = "#a89984", bold = true },
  { is = "link", fg = "#928374" },
]
