  { mime = "video/*", fg = "#d19a66" },
  { mime = "audio/*", fg = "#e5c07b" },
  { mime = "archive", fg = "#abb2bf" },
  { mime = "documents", fg = "#5c6370" },
  { is = "exec", fg = "#56b6c2", bold = true },
  { is = "link", fg = "#61afef" },
]
