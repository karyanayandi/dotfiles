colors:
  # Vesper
  color0: "101010"   # background
  color1: "161616"   # surface
  color2: "1C1C1C"   # overlay
  color3: "4A4A4A"   # muted dark
  color4: "A0A0A0"   # muted (comment)
  color5: "FFFFFF"   # foreground
  color6: "99FFE4"   # mint/cyan
  color7: "99FFE4"   # mint (bright green)
  color8: "99D1FF"   # blue
  color9: "D5B8FF"   # purple
  color10: "99FFE4"  # mint (dark blue/green)
  color11: "FF8080"  # red
  color12: "FFC799"  # accent orange
  color13: "FFD580"  # yellow
  color14: "99FFE4"  # mint (green)
  dim-foreground: "A0A0A0"

core:
  normal_text:
    foreground: dim-foreground
  reset_to_normal:
