colors:
  # Rose Pine: base=bg, base0x=surface/overlay/palette
  color0: "191724"   # base (background)
  color1: "1f1d2e"   # surface
  color2: "26233a"   # overlay
  color3: "6e6a86"   # muted
  color4: "908caa"   # subtle
  color5: "e0def4"   # text (foreground)
  color6: "ebbcba"   # rose
  color7: "9ccfd8"   # foam (bright cyan)
  color8: "31748f"   # pine (cyan/teal)
  color9: "9ccfd8"   # foam (blue-ish)
  color10: "31748f"  # pine (dark blue/green)
  color11: "eb6f92"  # love (red)
  color12: "f6c177"  # gold (orange)
  color13: "f6c177"  # gold (yellow)
  color14: "9ccfd8"  # foam (green)
  dim-foreground: "908caa"

