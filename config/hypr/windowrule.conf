windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
    name = mpv
    match:class = ^(mpv)$
    float = yes
}

windowrule {
    name = viewnior
    match:class = ^(viewnior)$
    float = yes
}

windowrule {
    name = fileroller
    match:class = ^(org.gnome.FileRoller)$
    float = yes
    size = 1000 600
}

windowrule {
    name = bitwarden
    match:class = ^(chrome-nngceckbapebfimnlniiiahkandclblb-Default)$
    float = yes
}

windowrule {
    name = xdg-desktop-portal-gtk
    match:class = ^(xdg-desktop-portal-gtk)$
    float = yes
    size = 1200 800
}

windowrule {
    name = pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = yes
    size = 1000 600
}

windowrule {
    name = picture-in-picture
    match:title = ^(Picture-in-Picture)$
    float = yes
}

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}
